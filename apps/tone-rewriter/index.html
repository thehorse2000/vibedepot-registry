<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tone Rewriter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Tone Rewriter</h1>
      <p class="subtitle">Rewrite any text in your chosen tone</p>
    </header>

    <div class="form-group">
      <label for="inputText">Text to Rewrite</label>
      <textarea id="inputText" rows="6" placeholder="Paste the text you want to rewrite..."></textarea>
    </div>

    <div class="form-group">
      <label>Choose Tone</label>
      <div class="tone-pills" id="tonePills">
        <button class="tone-pill active" data-tone="formal">Formal</button>
        <button class="tone-pill" data-tone="casual">Casual</button>
        <button class="tone-pill" data-tone="bold">Bold</button>
        <button class="tone-pill" data-tone="empathetic">Empathetic</button>
        <button class="tone-pill" data-tone="humorous">Humorous</button>
        <button class="tone-pill" data-tone="concise">Concise</button>
      </div>
    </div>

    <div class="actions">
      <button id="rewriteBtn" onclick="rewriteText()">Rewrite</button>
    </div>

    <div id="loading" class="loading" style="display: none;">Rewriting...</div>

    <div id="outputSection" style="display: none;">
      <div class="form-group">
        <label>Rewritten Text</label>
        <div id="output" class="output"></div>
      </div>
      <div class="actions">
        <button onclick="copyToClipboard()">Copy to Clipboard</button>
        <button onclick="saveRewrite()">Save</button>
      </div>
    </div>

    <div id="historySection" style="display: none;">
      <h2>Recent Rewrites</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
