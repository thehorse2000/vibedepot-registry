<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>CSV Analyzer</h1>
      <p class="subtitle">Ask questions about your data in plain English</p>
    </header>

    <div class="form-group">
      <label for="csvData">CSV Data</label>
      <textarea id="csvData" rows="8" class="mono" placeholder="Paste your CSV data here (with headers)..."></textarea>
    </div>

    <div id="previewSection" style="display: none;">
      <div class="stats" id="stats"></div>
      <div class="table-wrap">
        <table id="previewTable"></table>
      </div>
    </div>

    <div class="form-group">
      <label for="question">Question</label>
      <input type="text" id="question" placeholder="e.g., What are the top 5 categories by revenue?" />
    </div>

    <div class="quick-actions">
      <button class="pill" onclick="askQuick('Summarize this dataset')">Summarize</button>
      <button class="pill" onclick="askQuick('Find trends in this data')">Find Trends</button>
      <button class="pill" onclick="askQuick('Spot anomalies or outliers')">Spot Anomalies</button>
    </div>

    <div class="actions">
      <button onclick="analyze()">Analyze</button>
    </div>

    <div id="loading" class="loading" style="display: none;">Analyzing...</div>

    <div id="outputSection" style="display: none;">
      <div class="form-group">
        <label>Analysis</label>
        <div id="output" class="output"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
